[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [
  "mlruns",
  "models",
  "data_lake",
  "tpot_models",
  "electron",
]

[tool.ruff.lint]
# Keep CI strict on critical errors first; expand over time.
select = ["E9", "F63", "F7", "F82"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"
filterwarnings = [
  "ignore::DeprecationWarning",
]
